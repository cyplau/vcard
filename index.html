<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chris Lau | Digital Card</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 30px;
        width: 340px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        position: relative;
      }

      .header {
        margin-bottom: 20px;
      }

      .name {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .role {
        color: #94a3b8;
        margin-top: 4px;
        font-size: 14px;
      }

      .divider {
        height: 1px;
        background: #1f2937;
        margin: 18px 0;
      }

      .info {
        font-size: 14px;
        margin: 6px 0;
        color: #e5e7eb;
      }

      .qr {
        margin-top: 20px;
        text-align: center;
      }

      .qr img {
        width: 110px;
        opacity: 0.95;
      }

      .buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        cursor: pointer;
      }

      .share {
        background: #2563eb;
        color: white;
      }

      .download {
        background: #374151;
        color: white;
      }

      button:hover {
        opacity: 0.9;
      }

      .footer {
        margin-top: 15px;
        text-align: center;
        font-size: 11px;
        color: #64748b;
      }

      .grid {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        border-radius: 14px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="grid"></div>

      <div class="header">
        <div class="name">Chris Lau</div>
        <div class="role">Engineering / Technology</div>
      </div>

      <div class="divider"></div>

      <div class="info">📞 +44 1234 567890</div>
      <div class="info">✉ chris@email.com</div>
      <div class="info">🌐 yourwebsite.com</div>

      <div class="buttons">
        <button class="share" onclick="shareCard()">Share</button>

        <a href="tony-kwok.vcf" download style="flex: 1">
          <button class="download">Download vCard</button>
        </a>
      </div>

      <div class="qr">
        <img src="qrcode.svg" alt="QR Code" />
      </div>
    </div>

    <script>
      function shareCard() {
        if (navigator.share) {
          navigator.share({
            title: "Chris Lau",
            text: "Connect with me",
            url: window.location.href,
          });
        } else {
          alert("Share not supported on this device");
        }
      }
    </script>
  </body>
</html>
