<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tony Kwok - Digital Card</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 350px;
        width: 90%;
      }

      .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: #ddd;
        margin: auto;
        margin-bottom: 15px;
      }

      h1 {
        margin: 10px 0 5px 0;
      }

      .title {
        color: #777;
        margin-bottom: 20px;
      }

      .info {
        margin: 6px 0;
        color: #444;
      }

      .buttons {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      .share {
        background: #007aff;
        color: white;
      }

      .download {
        background: #333;
        color: white;
      }

      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar"></div>

      <h1>Tony Kwok</h1>
      <div class="title">Property / Technology</div>

      <div class="info">📞 +44 1234 567890</div>
      <div class="info">✉ tony@email.com</div>
      <div class="info">🌐 yourwebsite.com</div>

      <div class="buttons">
        <button class="share" onclick="shareCard()">Share Contact</button>

        <a href="tony-kwok.vcf" download>
          <button class="download">Download vCard</button>
        </a>
      </div>
    </div>

    <script>
      function shareCard() {
        if (navigator.share) {
          navigator.share({
            title: "Tony Kwok",
            text: "My Digital Business Card",
            url: window.location.href,
          });
        } else {
          alert("Sharing not supported on this device.");
        }
      }
    </script>
  </body>
</html>
